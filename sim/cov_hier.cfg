################################################################################
# cov_hier.cfg  —  VCS Coverage Hierarchy Configuration
#
#   Only collect code coverage for the DUT (sm4_wrapper and all children).
#   Excludes UVM testbench components and library code from the score.
################################################################################

# Exclude everything at testbench top (UVM components, interfaces, etc.)
-tree tb_top

# Re-include only the DUT sub-tree
+tree tb_top.u_dut
